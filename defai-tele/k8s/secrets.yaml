apiVersion: v1
kind: Secret
metadata:
  name: defai-secrets
type: Opaque
data:
  # Base64 encoded values - replace with actual base64 encoded secrets
  database-url: <base64-encoded-database-url>
  redis-url: <base64-encoded-redis-url>
  telegram-bot-token: <base64-encoded-telegram-bot-token>
  alchemy-api-key: <base64-encoded-alchemy-api-key>
  infura-api-key: <base64-encoded-infura-api-key>
  jwt-secret: <base64-encoded-jwt-secret>
  stripe-secret-key: <base64-encoded-stripe-secret-key>
  stripe-webhook-secret: <base64-encoded-stripe-webhook-secret>
  walletconnect-project-id: <base64-encoded-walletconnect-project-id> 